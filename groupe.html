```html
<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALIZARINE - GROUPE</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header id="header">

    <img src="logo.png" class="main-logo" alt="ALIZARINE">

    <p class="subtitle">
        Duo de punk rock alternatif
    </p>

</header>

<nav>
    <a href="groupe.html">Concerts</a>
    <a href="musique.html">Musique</a>
    <a href="contact.html">Contact</a>
    <a href="fest.html">ALIZA'FEST</a>
</nav>

<section class="hero">

<div class="box">

<h2>CONCERTS</h2>

<ul>

<li class="concert" data-date="2026-06-06">
    <span>06 juin 2026 : Rouen(76) - Le comptoir des pirates - Youpoor</span>
    <img src="affiche37.jpg" class="poster">
</li>

<li class="concert" data-date="2025-08-23">
    <span>23 août 2025 : Le Fidelaire(27) - L'Aliza'Fest#3</span>
    <img src="affiche32.jpg" class="poster">
</li>

<li class="concert" data-date="2025-07-17">
    <span>17 juillet 2025 : Caen(14) - Utopistes Partout!, Jester</span>
    <img src="affiche29.jpg" class="poster">
</li>

</ul>

</div>

</section>

<script>

/* HEADER */

window.addEventListener("scroll", function(){

    const header = document.getElementById("header");

    if(window.scrollY > 50){
        header.classList.add("scrolled");
    } else {
        header.classList.remove("scrolled");
    }

});

/* DATES */

const today = new Date();

const concerts = document.querySelectorAll(".concert");

concerts.forEach(item => {

    const concertDate =
    new Date(item.dataset.date);

    if(concertDate >= today){
        item.classList.add("upcoming");
    } else {
        item.classList.add("past");
    }

});

/* MOBILE CLICK */

if(window.innerWidth <= 768){

    concerts.forEach(concert => {

        concert.addEventListener("click", () => {

            concert.classList.toggle("active");

        });

    });

}

</script>

</body>
</html>
```
