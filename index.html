<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALIZARINE</title>

<style>
body{
    margin:0;
    background:black;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:160px;
    flex-wrap:wrap;
}

/* LOGOS PLUS GROS */
.logo{
    width:320px;
    max-width:80vw;
    cursor:pointer;
    transition:0.3s;
}

/* ALIZARINE = glitch */
.aliza:hover{
    animation:glitch 0.15s infinite;
    filter:
    drop-shadow(3px 0 #ff0000)
    drop-shadow(-3px 0 #00ffff)
    drop-shadow(0 0 25px #ff0000);
    transform:scale(1.06);
}

/* FEST = pulse */
.fest:hover{
    animation:pulse 0.8s infinite;
    filter:
    drop-shadow(0 0 30px #ff0000);
    transform:scale(1.1);
}

/* GLITCH */
@keyframes glitch{
    0%{transform:translate(0);}
    20%{transform:translate(-3px,2px);}
    40%{transform:translate(3px,-2px);}
    60%{transform:translate(-2px,-2px);}
    80%{transform:translate(2px,2px);}
    100%{transform:translate(0);}
}

/* PULSE FEST */
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}
</style>

</head>

<body>

<!-- ALIZARINE -->
<a href="home.html">
    <img src="logo.png" class="logo aliza">
</a>

<!-- FEST -->
<a href="fest.html">
    <img src="logo-fest.png" class="logo fest">
</a>

</body>

</html>
